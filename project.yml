name: SimpleWeb
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "2"
    INFOPLIST_FILE: SimpleWeb/Info.plist

targets:
  SimpleWeb:
    type: application
    platform: iOS
    sources:
      - path: SimpleWeb
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.simpleweb
        INFOPLIST_FILE: SimpleWeb/Info.plist
        DEVELOPMENT_TEAM: ""
