workflows:
  simpleweb-ios:
    name: SimpleWeb iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build for device (unsigned)
        script: |
          xcodebuild -project SimpleWeb.xcodeproj -target SimpleWeb -sdk iphoneos -configuration Debug SYMROOT=build build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1
      - name: Package .ipa
        script: |
          mkdir -p Payload
          cp -R build/Debug-iphoneos/SimpleWeb.app Payload/
          zip -r SimpleWeb.ipa Payload/
    artifacts:
      - build/Debug-iphoneos/*.app
      - SimpleWeb.ipa
    publishing:
      email:
        recipients:
          - you@email.com
